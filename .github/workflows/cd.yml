name: CD — Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI — Test & Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://api.staging.example.com/swagger-ui.html

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || 'sha-' }}${{ github.sha }}"
          echo "tag=${TAG:0:20}" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (Staging)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install spring-ai-starter ./helm/spring-ai-starter \
            --namespace spring-ai-staging \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set ingress.host=api.staging.example.com \
            --set replicaCount=2 \
            --set env.SPRING_PROFILES_ACTIVE=staging \
            --set secrets.OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --set secrets.ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --wait --timeout=5m

      - name: Verify deployment health
        run: |
          kubectl rollout status deployment/spring-ai-starter \
            -n spring-ai-staging --timeout=3m
          
          # Wait for pod to be ready then hit health endpoint
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=spring-ai-starter \
            -n spring-ai-staging --timeout=2m

      - name: Smoke test — actuator health
        run: |
          sleep 10
          STATUS=$(curl -sf https://api.staging.example.com/actuator/health | jq -r '.status')
          echo "Health status: $STATUS"
          [ "$STATUS" = "UP" ] || exit 1

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "✅ *spring-ai-starter* deployed to *staging* — ${{ steps.tag.outputs.tag }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Deploy to Production (manual approval required) ───────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://api.example.com/swagger-ui.html

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (Production)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Deploy to production via Helm
        run: |
          helm upgrade --install spring-ai-starter ./helm/spring-ai-starter \
            --namespace spring-ai-prod \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.event.inputs.image_tag || 'latest' }} \
            --set ingress.host=api.example.com \
            --set replicaCount=3 \
            --set resources.requests.memory=1Gi \
            --set resources.limits.memory=2Gi \
            --set env.SPRING_PROFILES_ACTIVE=production \
            --set secrets.OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --set secrets.ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --wait --timeout=10m

      - name: Notify Slack on production deploy
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "${{ job.status == 'success' && '🚀' || '🔴' }} *spring-ai-starter* production deploy: *${{ job.status }}*"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

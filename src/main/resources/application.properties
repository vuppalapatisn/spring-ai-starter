# ================================================================
# Spring AI Ecosystem Starter — application.properties
# ================================================================

spring.application.name=spring-ai-starter

# ===================== MODEL PROVIDERS ========================
# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.embedding.options.model=text-embedding-3-small

# Anthropic Claude
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-opus-4-6
spring.ai.anthropic.chat.options.max-tokens=2048

# Mistral AI
spring.ai.mistralai.api-key=${MISTRAL_API_KEY}
spring.ai.mistralai.chat.options.model=mistral-large-latest

# Ollama (local — Meta Llama)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2

# ===================== VECTOR STORES ==========================
# pgvector
spring.datasource.url=jdbc:postgresql://localhost:5432/springai
spring.datasource.username=${DB_USERNAME:springai}
spring.datasource.password=${DB_PASSWORD:springai}
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.initialize-schema=true

# Redis Vector Store
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.ai.vectorstore.redis.index=spring-ai-index
spring.ai.vectorstore.redis.prefix=embedding:

# Chroma
spring.ai.vectorstore.chroma.client.host=localhost
spring.ai.vectorstore.chroma.client.port=8000
spring.ai.vectorstore.chroma.collection-name=spring-ai-collection

# Qdrant
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=spring-ai-qdrant

# ===================== MEMORY & STATE =========================
# MongoDB (chat history, long-term memory)
spring.data.mongodb.uri=mongodb://localhost:27017/springai

# ===================== OBSERVABILITY ==========================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# OpenTelemetry / Grafana
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# ===================== RAG SETTINGS ===========================
app.rag.chunk-size=800
app.rag.chunk-overlap=100
app.rag.top-k=5
app.rag.similarity-threshold=0.75

# ===================== AGENT SETTINGS =========================
app.agent.max-iterations=10
app.agent.timeout-seconds=60

# ===================== LOGGING ================================
logging.level.org.springframework.ai=DEBUG
logging.level.com.example.springai=DEBUG

# ===================== MCP CLIENT =============================
# Spring AI auto-configures McpSyncClient beans for each connection entry below.
# SyncMcpToolCallbackProvider is also auto-created; McpChatService picks it up automatically.

spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.toolcallback.enabled=true

# Option A: SSE (HTTP) MCP Server
# Uncomment and point to your running MCP server's SSE endpoint.
# spring.ai.mcp.client.sse.connections.my-server.url=http://localhost:3001/sse

# Option B: STDIO MCP Server (local subprocess launched by Spring AI)
# Each entry below starts one npx-based MCP tool server as a child process.

# Brave Search
# spring.ai.mcp.client.stdio.connections.brave-search.command=npx
# spring.ai.mcp.client.stdio.connections.brave-search.args=-y,@modelcontextprotocol/server-brave-search
# spring.ai.mcp.client.stdio.connections.brave-search.env.BRAVE_API_KEY=${BRAVE_API_KEY}

# Filesystem access
# spring.ai.mcp.client.stdio.connections.filesystem.command=npx
# spring.ai.mcp.client.stdio.connections.filesystem.args=-y,@modelcontextprotocol/server-filesystem,/tmp

# GitHub
# spring.ai.mcp.client.stdio.connections.github.command=npx
# spring.ai.mcp.client.stdio.connections.github.args=-y,@modelcontextprotocol/server-github
# spring.ai.mcp.client.stdio.connections.github.env.GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN}


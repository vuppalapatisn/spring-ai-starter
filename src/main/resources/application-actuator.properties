# ================================================================
# application-actuator.properties  (merge into application.properties)
# Or use as a separate Spring profile: --spring.profiles.active=actuator
# ================================================================

# ===================== SPRING BOOT ACTUATOR ====================
# Expose all endpoints (restrict in production via security config)
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator

# Health — show full details (use 'when-authorized' in production)
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.diskspace.enabled=true
management.health.db.enabled=true
management.health.redis.enabled=true
management.health.mongo.enabled=true

# Info endpoint — app metadata
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.git.enabled=true
management.info.build.enabled=true

info.app.name=Spring AI Starter
info.app.description=Production-ready Spring AI Ecosystem
info.app.version=@project.version@
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@

# Prometheus scraping
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

# Metrics
management.metrics.enable.all=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.sla.http.server.requests=50ms,100ms,200ms,500ms

# Tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# Shutdown endpoint (disabled by default, enable carefully)
management.endpoint.shutdown.enabled=false

# ===================== SWAGGER / SPRINGDOC ====================
# Swagger UI at: /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true

# Group APIs by feature
springdoc.group-configs[0].group=chat
springdoc.group-configs[0].paths-to-match=/api/chat/**
springdoc.group-configs[0].display-name=Chat API

springdoc.group-configs[1].group=rag
springdoc.group-configs[1].paths-to-match=/api/rag/**
springdoc.group-configs[1].display-name=RAG API

springdoc.group-configs[2].group=agents
springdoc.group-configs[2].paths-to-match=/api/agent/**
springdoc.group-configs[2].display-name=Agent API

springdoc.group-configs[3].group=embeddings
springdoc.group-configs[3].paths-to-match=/api/embedding/**
springdoc.group-configs[3].display-name=Embedding API

# Show actuator in Swagger
springdoc.show-actuator=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
